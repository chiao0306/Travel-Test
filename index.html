<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025 東京專屬行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #F8F9FA; min-height: 100vh; position: relative; padding-bottom: 90px; }
        
        .hero-image {
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=800&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .card-details {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0;
        }
        .card-details.open { max-height: 500px; opacity: 1; }
        .chevron { transition: transform 0.3s ease; }
        .chevron.open { transform: rotate(180deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div class="app-container shadow-xl">
    
    <div class="hero-image h-48 w-full relative rounded-b-3xl shadow-md">
        <div class="absolute bottom-5 left-5 text-white">
            <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold mb-2 inline-block">2025 行程表</span>
            <h1 class="text-3xl font-black mb-1">東京・富士山・鎌倉</h1>
            <p class="text-sm opacity-90"><i class="fa-regular fa-calendar mr-1"></i> 7 天 6 夜</p>
        </div>
    </div>

    <div class="px-2 py-3 sticky top-0 bg-[#F8F9FA]/95 backdrop-blur-md z-40 border-b border-gray-200">
        <div id="day-nav" class="flex gap-4 overflow-x-auto no-scrollbar px-3 pb-1"></div>
    </div>

    <div class="px-5 py-6">
        <div class="text-sm font-bold text-gray-400 mb-4 ml-1" id="current-date-title"></div>
        <div id="timeline-container" class="relative">
            <div class="absolute top-0 bottom-0 left-[54px] w-0.5 bg-gray-200 z-0"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 pb-safe pt-2 px-6 flex justify-around items-center z-50">
        <div class="flex flex-col items-center p-2 text-blue-600"><i class="fa-solid fa-calendar-days text-xl mb-1"></i><span class="text-[10px] font-bold">行程</span></div>
        <div class="flex flex-col items-center p-2 text-gray-400"><i class="fa-solid fa-compass text-xl mb-1"></i><span class="text-[10px] font-bold">探索</span></div>
        <div class="flex flex-col items-center p-2 text-gray-400 relative">
            <div class="absolute -top-6 bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-blue-200"><i class="fa-solid fa-plus text-xl"></i></div>
        </div>
        <div class="flex flex-col items-center p-2 text-gray-400"><i class="fa-solid fa-wallet text-xl mb-1"></i><span class="text-[10px] font-bold">記帳</span></div>
        <div class="flex flex-col items-center p-2 text-gray-400"><i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px] font-bold">我的</span></div>
    </div>
</div>

<script>
    // 加入了 mapQuery 欄位，確保 Google Maps 能精準定位
    const itineraryData = [
        {
            dayId: 1, date: "5/17 (六)", title: "高雄 - 赤羽 - 上野",
            events: [
                { time: "06:00", title: "前往高雄機場", mapQuery: "高雄國際機場", transport: "搭乘第一班捷運到高雄機場", details: "5:40 起床準備" },
                { time: "08:15", title: "✈️ 飛往成田機場", mapQuery: "成田空港第2ターミナル", transport: "亞航 FD 234", details: "13:05 抵達成田機場第二航廈" },
                { time: "14:00", title: "前往飯店與 Check-in", mapQuery: "WING HOTEL AKABANE", transport: "搭乘 Skyliner ➡️ 轉搭京濱東北線至赤羽", details: "走路至赤羽車站約 12 分" },
                { time: "18:00", title: "🌇 谷中銀座商店街", mapQuery: "谷中銀座商店街", transport: "赤羽站搭京濱東北線至日暮里站 (20分鐘)", details: "觀賞最美夕陽黃昏坡道" },
                { time: "19:00", title: "🍱 上野晚餐", mapQuery: "名代 宇奈とと 上野店", transport: "再往南坐一站 (6分鐘) 到京成上野站", details: "備案: 鴨to蔥拉麵 / Aidaya" }
            ]
        },
        {
            dayId: 2, date: "5/18 (日)", title: "淺草 - 晴空塔",
            events: [
                { time: "08:00", title: "前往淺草", mapQuery: "浅草駅", transport: "搭乘宇都宮線/高崎線至上野 ➡️ 換銀座線至淺草", details: "從飯店步行約12分至赤羽站" },
                { time: "09:00", title: "Ginza Brazil", mapQuery: "銀座ブラジル 浅草店舗", transport: "步行", details: "吃炸豬排三明治" },
                { time: "11:00", title: "淺草周邊散步", mapQuery: "浅草寺", transport: "步行", details: "仲見世通商店街 ➡️ 八十八良葉舍 ➡️ 淺草寺" },
                { time: "15:00", title: "壽喜燒 米久本店", mapQuery: "米久本店 浅草", transport: "步行", details: "(備案: 浅草今半)" },
                { time: "18:00", title: "🗼 晴空塔觀景", mapQuery: "東京スカイツリー", transport: "搭乘 東武晴空塔線 前往押上站", details: "18:00 前取票。隨後逛天文館、晴空街道" },
                { time: "21:00", title: "返回飯店", mapQuery: "WING HOTEL AKABANE", transport: "搭車返回赤羽", details: "順路買隔天早餐" }
            ]
        },
        {
            dayId: 3, date: "5/19 (一)", title: "富士山河口湖",
            events: [
                { time: "07:00", title: "出發前往河口湖", mapQuery: "河口湖駅", transport: "赤羽搭埼京線至新宿 ➡️ 07:45 轉搭富士急巴士", details: "09:40 抵達轉租車自駕" },
                { time: "09:00", title: "羅森便利商店", mapQuery: "ローソン 河口湖駅前店", transport: "🚗 自駕", details: "買點心與水" },
                { time: "10:00", title: "天上山公園 & 纜車", mapQuery: "富士山パノラマロープウェイ", transport: "🚗 自駕 + 🚠 搭乘纜車", details: "包含兔子神社" },
                { time: "13:00", title: "午餐: ほうとう 不動", mapQuery: "ほうとう不動 東恋路店", transport: "🚗 自駕", details: "超大鍋的不動烏龍麵" },
                { time: "14:00", title: "新倉富士淺間公園", mapQuery: "新倉山浅間公園", transport: "🚗 自駕", details: "拍五重塔與富士山" },
                { time: "17:00", title: "還車 & 買土產", mapQuery: "Gateway Fujiyama 河口湖駅店", transport: "🚗 自駕返回河口湖站", details: "還車後買伴手禮" },
                { time: "18:15", title: "🚌 搭車返回新宿", mapQuery: "バスタ新宿", transport: "高速巴士", details: "晚餐: 鳳仙花拉麵" }
            ]
        },
        {
            dayId: 4, date: "5/20 (二)", title: "上野",
            events: [
                { time: "09:00", title: "上野恩賜公園", mapQuery: "上野恩賜公園", transport: "搭乘 宇都宮線 到上野", details: "星巴克 / 東照宮 / 不忍池" },
                { time: "12:00", title: "午餐: 沼津港 海將", mapQuery: "沼津港 海将 上野1号店", transport: "步行", details: "海鮮吃到飽" },
                { time: "13:00", title: "阿美橫町購物", mapQuery: "アメ横", transport: "步行", details: "二木的菓子 / 多慶屋 / Yodobashi Camera" },
                { time: "18:00", title: "晚餐: 燒肉 房家", mapQuery: "房家 上野六丁目店", transport: "步行", details: "和牛燒肉" },
                { time: "19:00", title: "不忍池夜景", mapQuery: "不忍池", transport: "步行", details: "看完夜景後搭車回飯店" }
            ]
        },
        {
            dayId: 5, date: "5/21 (三)", title: "鎌倉",
            events: [
                { time: "09:00", title: "Cafe Yoridocoro", mapQuery: "ヨリドコロ 鎌倉", transport: "赤羽站搭高崎線轉湘南新宿線", details: "超人氣鐵道咖啡廳 (先排隊)" },
                { time: "10:00", title: "鎌倉神社巡禮", mapQuery: "鶴岡八幡宮", transport: "步行", details: "鶴岡八幡宮 (白鴿鈴鐺) ➡️ 錢洗神社" },
                { time: "11:00", title: "鎌倉小町通", mapQuery: "小町通り", transport: "步行", details: "Giraffa咖哩麵包 / 鎌倉茶々" },
                { time: "13:00", title: "江之電沿線", mapQuery: "鎌倉高校前駅", transport: "🚃 搭乘江之電", details: "鎌倉高校前站 (灌籃高手) ➡️ 長谷站 (大佛)" },
                { time: "15:00", title: "江之島", mapQuery: "江の島", transport: "步行", details: "弁天橋 ➡️ 仲見世通 ➡️ 邊津宮" },
                { time: "19:00", title: "江之島展望燈塔", mapQuery: "江の島シーキャンドル", transport: "步行", details: "看夜景後搭車回飯店" }
            ]
        },
        {
            dayId: 6, date: "5/22 (四)", title: "原宿 - 涉谷 - 新宿",
            events: [
                { time: "08:00", title: "松屋早餐", mapQuery: "松屋 赤羽店", transport: "步行", details: "吃完搭湘南新宿線出發" },
                { time: "10:00", title: "明治神宮 & 原宿", mapQuery: "明治神宮", transport: "步行", details: "明治神宮 ➡️ 竹下通 ➡️ 貓街" },
                { time: "13:00", title: "忠犬小八", mapQuery: "忠犬ハチ公像", transport: "步行", details: "八公忠犬像 / hale'aina HOA" },
                { time: "14:00", title: "涉谷商圈", mapQuery: "SHIBUYA SAKURA STAGE", transport: "步行", details: "涉谷商店街 ➡️ Sakura Stage ➡️ PARCO" },
                { time: "17:00", title: "前往新宿晚餐", mapQuery: "半兵ヱ 新宿", transport: "搭車前往新宿", details: "晚餐: 薄利多賣半兵ヱ居酒屋" }
            ]
        },
        {
            dayId: 7, date: "5/23 (五)", title: "築地 - 豐洲 - 台場",
            events: [
                { time: "09:00", title: "築地市場吃早餐", mapQuery: "築地場外市場", transport: "搭宇都宮線轉日比谷線到築地", details: "山長玉子燒 / まぐろや黒銀 / 丸豊飯糰" },
                { time: "11:00", title: "月島吃文字燒", mapQuery: "月島もんじゃストリート", transport: "走路 (20分) 或搭車至月島", details: "西仲通商店吃文字燒" },
                { time: "13:00", title: "豐洲市場", mapQuery: "豊洲市場", transport: "搭乘 有樂町線 去豐洲", details: "豐洲市場 / 江户前場下町" },
                { time: "15:00", title: "teamLab & LaLaport", mapQuery: "teamLab Planets TOKYO", transport: "步行", details: "需備妥憑證。結束後逛 LaLaport" },
                { time: "17:00", title: "前往台場", mapQuery: "実物大ユニコーンガンダム立像", transport: "搭乘 百合海鷗線 到 台場", details: "獨角獸鋼彈 (1/3/5/7點燈)" },
                { time: "20:00", title: "彩虹大橋夜景", mapQuery: "お台場海浜公園", transport: "步行", details: "賞夜景後搭車回飯店" }
            ]
        }
    ];

    let currentDayId = 1;

    function renderNav() {
        const navContainer = document.getElementById('day-nav');
        navContainer.innerHTML = '';
        itineraryData.forEach(day => {
            const btn = document.createElement('button');
            const isActive = day.dayId === currentDayId;
            btn.className = `font-bold text-lg whitespace-nowrap pb-1 border-b-2 transition-colors ${isActive ? 'text-black border-black' : 'text-gray-400 border-transparent'}`;
            btn.innerText = `Day ${day.dayId}`;
            btn.onclick = () => {
                currentDayId = day.dayId;
                renderNav();
                renderTimeline();
            };
            navContainer.appendChild(btn);
        });
    }

    function renderTimeline() {
        const dayData = itineraryData.find(d => d.dayId === currentDayId);
        document.getElementById('current-date-title').innerText = `${dayData.date} • ${dayData.title}`;
        
        const container = document.getElementById('timeline-container');
        container.innerHTML = '<div class="absolute top-0 bottom-0 left-[54px] w-0.5 bg-gray-200 z-0"></div>';

        dayData.events.forEach((event, index) => {
            const el = document.createElement('div');
            el.className = 'relative z-10 flex mb-5';
            
            // 這裡把 URL 改成了真正的 Google Maps 搜尋 API！
            // 並且使用 event.mapQuery 作為關鍵字
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.mapQuery)}`;

            el.innerHTML = `
                <div class="w-14 pt-3 text-right pr-4 shrink-0">
                    <span class="text-[13px] font-black text-gray-800 tracking-tighter">${event.time}</span>
                </div>
                
                <div class="w-4 h-4 rounded-full border-4 border-[#F8F9FA] bg-blue-500 absolute left-[47px] top-3.5 shadow-sm"></div>
                
                <div class="ml-4 flex-1 bg-white rounded-2xl shadow-[0_2px_10px_rgba(0,0,0,0.04)] border border-gray-100 overflow-hidden">
                    
                    <div class="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50 transition-colors" onclick="toggleCard(${index})">
                        <h3 class="font-bold text-gray-900 text-[15px]">${event.title}</h3>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-sm chevron" id="chevron-${index}"></i>
                    </div>

                    <div class="card-details bg-gray-50/50 border-t border-gray-50" id="details-${index}">
                        <div class="p-4 pt-2">
                            <div class="mb-3">
                                <span class="text-xs font-bold text-gray-400 mb-1 block">🚇 前往方式</span>
                                <p class="text-sm text-gray-700 leading-relaxed font-medium text-blue-800 bg-blue-50/50 p-2 rounded-lg border border-blue-100">
                                    ${event.transport}
                                </p>
                            </div>
                            
                            ${event.details ? `
                            <div class="mb-4">
                                <span class="text-xs font-bold text-gray-400 mb-1 block">📝 行程筆記</span>
                                <p class="text-[13px] text-gray-600 leading-relaxed">${event.details}</p>
                            </div>` : ''}

                            <a href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer" class="block w-full bg-white text-gray-700 border border-gray-200 text-center text-[13px] font-bold py-2.5 rounded-xl shadow-sm active:bg-gray-100 transition">
                                <i class="fa-solid fa-location-arrow text-blue-500 mr-1"></i> 導航至此
                            </a>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function toggleCard(index) {
        document.getElementById(`details-${index}`).classList.toggle('open');
        document.getElementById(`chevron-${index}`).classList.toggle('open');
    }

    renderNav();
    renderTimeline();
</script>
</body>
</html>
